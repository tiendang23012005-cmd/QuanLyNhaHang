<div class="food-container">

    <div class="header">

        <div>

            <small>QUẢN LÝ MÓN ĂN</small>

            <h2>Cập nhật món ăn</h2>

            <p>Chỉnh sửa thông tin món ăn</p>

        </div>

    </div>

    <div class="food-form">

        <div class="form-group">

            <label>Tên món ăn</label>

            <input
                type="text"
                [(ngModel)]="Food.tenMonAn">

        </div>

        <div class="form-group">

            <label>Danh mục món ăn</label>

            <select
                [(ngModel)]="Food.maDanhMuc">

                <option [value]="1">
                    Món chính
                </option>

                <option [value]="2">
                    Nước uống
                </option>

                <option [value]="3">
                    Tráng miệng
                </option>

                <option [value]="4">
                    Thức ăn nhanh
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>Giá</label>

            <input
                type="number"
                [(ngModel)]="Food.gia">

        </div>

        <div class="form-group">

            <label>Mô tả</label>

            <textarea
                [(ngModel)]="Food.moTa">
            </textarea>

        </div>

        <div class="form-group">

            <label>Hình ảnh (emoji)</label>

            <input
                type="text"
                [(ngModel)]="Food.hinhAnh">

        </div>

        <div class="checkbox">

            <input
                type="checkbox"
                [(ngModel)]="Food.conBan">

            <span>Còn bán</span>

        </div>

        <div class="actions">

            <button
                class="cancel-btn"
                (click)="GoBack()">

                Hủy

            </button>

            <button
                class="save-btn"
                (click)="Save()">

                Cập nhật

            </button>

        </div>

    </div>

</div>
