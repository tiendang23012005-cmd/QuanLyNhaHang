<div class="create-container">

    <div class="header">

        <div>

            <small>QUẢN LÝ BÀN</small>

            <h2>Thêm bàn mới</h2>

            <p>
                Tạo bàn mới cho nhà hàng
            </p>

        </div>

    </div>

    <div class="form-card">

        <div class="form-grid">

            <div class="form-group">

                <label>🍽️ Số bàn</label>

                <input
                    type="text"
                    placeholder="Ví dụ: Bàn 07"
                    [(ngModel)]="NewTable.soBan">

            </div>

            <div class="form-group">

                <label>👥 Sức chứa</label>

                <input
                    type="number"
                    min="1"
                    [(ngModel)]="NewTable.sucChua">

            </div>

            <div class="form-group">

                <label>📌 Trạng thái</label>

                <select
                    [(ngModel)]="NewTable.trangThaiBan">

                    <option value="Trống">
                        Trống
                    </option>

                    <option value="Đang phục vụ">
                        Đang phục vụ
                    </option>

                    <option value="Đã đặt trước">
                        Đã đặt trước
                    </option>

                </select>

            </div>

        </div>

        <div class="button-group">

            <button
                class="cancel-btn"
                routerLink="/admin/table-management">

                ← Quay lại

            </button>

            <button
                class="save-btn"
                (click)="AddTable()">

                💾 Lưu bàn

            </button>

        </div>

    </div>

</div>
