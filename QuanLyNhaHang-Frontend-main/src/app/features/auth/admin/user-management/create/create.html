<div class="create-container">

    <div class="header">

        <div>

            <small>QUẢN LÝ NHÂN VIÊN</small>

            <h2>Thêm nhân viên mới</h2>

            <p>
                Tạo tài khoản nhân viên mới cho hệ thống
            </p>

        </div>

    </div>

    <div class="form-card">

        <div class="form-grid">

            <div class="form-group">

                <label>👤 Họ và tên</label>

                <input
                    type="text"
                    placeholder="Nhập họ tên"
                    [(ngModel)]="NewUser.hoTen">

            </div>

            <div class="form-group">

                <label>📧 Email</label>

                <input
                    type="email"
                    placeholder="Nhập email"
                    [(ngModel)]="NewUser.email">

            </div>

            <div class="form-group">

                <label>📱 Số điện thoại</label>

                <input
                    type="text"
                    placeholder="Nhập số điện thoại"
                    [(ngModel)]="NewUser.dienThoai">

            </div>

            <div class="form-group">

                <label>🔐 Mật khẩu</label>

                <input
                    type="password"
                    placeholder="Nhập mật khẩu"
                    [(ngModel)]="NewUser.matKhau">

            </div>

            <div class="form-group">

                <label>👥 Vai trò</label>

                <select
                    [(ngModel)]="NewUser.maVaiTro">

                    <option [value]="2">
                        Phục vụ
                    </option>

                    <option [value]="3">
                        Nhà bếp
                    </option>

                    <option [value]="4">
                        Thu ngân
                    </option>

                </select>

            </div>

        </div>

        <div class="button-group">

            <button
                class="cancel-btn"
                routerLink="/admin/user-management">

                ← Quay lại

            </button>

            <button
                class="save-btn"
                (click)="AddEmployee()">

                💾 Lưu nhân viên

            </button>

        </div>

    </div>

</div>
